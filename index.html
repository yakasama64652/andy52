<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VA Classroom Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f6f7fb;
}

/* TOPBAR */
.topbar {
    background: linear-gradient(90deg, #e63946, #c1121f);
    color: white;
    padding: 15px;
    font-weight: bold;
}

/* LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar {
    width: 25%;
    background: #111827;
    color: white;
    padding: 20px;
}

.sidebar button {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
    background: #1f2937;
    border: 1px solid #374151;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* MAIN */
.main {
    width: 75%;
    padding: 20px;
    overflow-y: auto;
}

/* CARD */
.card {
    background: white;
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 15px;
    border: 1px solid #e5e7eb;
}

/* INPUTS */
input, select {
    padding: 10px;
    margin: 8px 0;
    width: 280px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
}

/* BUTTON */
button {
    background: #e63946;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 8px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
}

/* SEAT */
.seat {
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    min-height: 70px;
}

.seat.highlight {
    border: 2px solid #e63946;
    background: rgba(230,57,70,0.08);
}

/* TOAST */
.toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #111827;
    color: white;
    padding: 12px;
    border-left: 5px solid #e63946;
    border-radius: 8px;
    opacity: 0;
    transition: 0.3s;
    z-index: 9999;
}

.toast.show {
    opacity: 1;
}

/* MODAL BACKDROP */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(17,24,39,0.65);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10000;
}

.modal-overlay.active {
    display: flex;
}

/* ACTION POPUP (RESTORED) */
.action-box {
    background: white;
    width: 300px;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    animation: pop 0.2s ease;
}

@keyframes pop {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.action-box button {
    width: 100%;
    margin: 6px 0;
    padding: 10px;
    border-radius: 8px;
}

.edit { background: #2563eb; }
.move { background: #f59e0b; }
.delete { background: #e63946; }
.close { background: #6b7280; }
</style>
</head>

<body>

<div class="topbar">VA Classroom Dashboard</div>

<div class="container">

<div class="sidebar">
    <h3>Trainer View</h3>
    <button onclick="switchTrainer('Au')">Au</button>
    <button onclick="switchTrainer('Chanie')">Chanie</button>
    <button onclick="switchTrainer('Leo')">Leo</button>

    <hr>

    <div id="occupancy">0/10 seats</div>

    <h4>Search VA</h4>
    <input id="searchBox" onkeydown="handleSearch(event)">
</div>

<div class="main">

<div class="card">
    <h3>Assign VA</h3>
    <input id="vaName" placeholder="VA Name">
    <input id="agency" placeholder="Agency">

    <select id="trainerSelect">
        <option value="">Select Trainer</option>
        <option>Au</option>
        <option>Chanie</option>
        <option>Leo</option>
    </select>

    <button onclick="assignVA()">Assign VA</button>
</div>

<div class="card">
    <h3 id="classTitle"></h3>
    <div class="grid" id="seatGrid"></div>
</div>

</div>
</div>

<!-- ACTION POPUP -->
<div id="actionModal" class="modal-overlay">
    <div class="action-box">
        <h3 id="actionTitle"></h3>

        <button class="edit" onclick="editVA()">Edit</button>
        <button class="move" onclick="moveVA()">Move</button>
        <button class="delete" onclick="deleteVA()">Delete</button>
        <button class="close" onclick="closeAction()">Close</button>
    </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>

let trainers = JSON.parse(localStorage.getItem("va_data")) || {
    Au: [],
    Chanie: [],
    Leo: []
};

let currentTrainer = "Au";
let selectedIndex = null;

/* SAVE */
function save() {
    localStorage.setItem("va_data", JSON.stringify(trainers));
}

/* TOAST */
function toast(msg) {
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
}

/* SWITCH */
function switchTrainer(t) {
    currentTrainer = t;
    render();
}

/* ASSIGN */
function assignVA() {
    let name = document.getElementById("vaName").value;
    let agency = document.getElementById("agency").value;
    let trainer = document.getElementById("trainerSelect").value;

    if (!name || !agency || !trainer) return;

    trainers[trainer].push({ name, agency });
    save();
    render();
    toast("VA added");
}

/* SEARCH */
function handleSearch(e) {
    if (e.key === "Enter") searchVA(e.target.value);
}

function searchVA(q) {
    q = q.toLowerCase();

    for (let t in trainers) {
        for (let i = 0; i < trainers[t].length; i++) {
            if (trainers[t][i].name.toLowerCase().includes(q)) {
                currentTrainer = t;
                render();
                setTimeout(() => {
                    document.querySelectorAll(".seat")[i].classList.add("highlight");
                }, 100);
                return;
            }
        }
    }
}

/* RENDER */
function render() {
    let grid = document.getElementById("seatGrid");
    grid.innerHTML = "";

    let list = trainers[currentTrainer];
    document.getElementById("classTitle").innerText = currentTrainer;

    let filled = 0;

    for (let i = 0; i < 10; i++) {
        let seat = document.createElement("div");
        seat.className = "seat";

        let va = list[i];

        if (va) {
            seat.innerHTML = `<b>${va.name}</b><br>${va.agency}`;
            seat.onclick = () => openAction(i);
            filled++;
        } else {
            seat.innerHTML = "Empty";
        }

        grid.appendChild(seat);
    }

    document.getElementById("occupancy").innerText = filled + "/10 seats";
}

/* ACTION POPUP */
function openAction(i) {
    selectedIndex = i;
    document.getElementById("actionModal").classList.add("active");
    document.getElementById("actionTitle").innerText =
        trainers[currentTrainer][i].name;
}

function closeAction() {
    document.getElementById("actionModal").classList.remove("active");
}

/* DELETE */
function deleteVA() {
    trainers[currentTrainer].splice(selectedIndex, 1);
    save();
    closeAction();
    render();
    toast("Deleted");
}

/* EDIT */
function editVA() {
    let name = prompt("Edit Name");
    let agency = prompt("Edit Agency");

    if (!name || !agency) return;

    trainers[currentTrainer][selectedIndex] = { name, agency };
    save();
    render();
    closeAction();
}

/* MOVE */
function moveVA() {
    let t = prompt("Move to (Au, Chanie, Leo)");

    if (!trainers[t]) return;

    let va = trainers[currentTrainer][selectedIndex];

    trainers[t].push(va);
    trainers[currentTrainer].splice(selectedIndex, 1);

    save();
    render();
    closeAction();
}

/* INIT */
render();

</script>

</body>
</html>
