<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VA Classroom Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f6f7fb;
}

/* TOPBAR */
.topbar {
    background: linear-gradient(90deg, #e63946, #c1121f);
    color: white;
    padding: 15px;
    font-weight: bold;
}

/* LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar {
    width: 25%;
    background: #111827;
    color: white;
    padding: 20px;
}

.sidebar button {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
    background: #1f2937;
    border-radius: 8px;
    border: 1px solid #374151;
    color: white;
    cursor: pointer;
}

/* MAIN */
.main {
    width: 75%;
    padding: 20px;
}

/* CARD */
.card {
    background: white;
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 15px;
    border: 1px solid #e5e7eb;
}

/* INPUT */
input, select {
    padding: 10px;
    margin: 8px 0;
    width: 280px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
}

/* BUTTON */
button {
    background: #e63946;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 8px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
}

/* SEAT */
.seat {
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    cursor: pointer;
}

/* TOAST */
.toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #111827;
    color: white;
    padding: 12px;
    border-left: 5px solid #e63946;
    border-radius: 8px;
    opacity: 0;
    transition: 0.3s;
    z-index: 9999;
}

.toast.show {
    opacity: 1;
}

/* MODAL BACKDROP */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(17,24,39,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10000;
}

.modal.active {
    display: flex;
}

/* MODAL BOX */
.modal-box {
    background: white;
    width: 320px;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    animation: pop 0.2s ease;
}

@keyframes pop {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.modal-box input, .modal-box select {
    width: 100%;
    margin-top: 10px;
}

/* ACTION BUTTONS */
.action-box button {
    width: 100%;
    margin: 6px 0;
}

.secondary { background: #2563eb; }
.danger { background: #e63946; }
.closeBtn { background: #6b7280; }
</style>
</head>

<body>

<div class="topbar">VA Classroom Dashboard</div>

<div class="container">

<div class="sidebar">
    <h3>Trainer View</h3>
    <button onclick="switchTrainer('Au')">Au</button>
    <button onclick="switchTrainer('Chanie')">Chanie</button>
    <button onclick="switchTrainer('Leo')">Leo</button>

    <hr>

    <div id="occupancy">0/10 seats</div>

    <h4>Search VA</h4>
    <input id="searchBox" onkeydown="handleSearch(event)">
</div>

<div class="main">

<div class="card">
    <h3>Assign VA</h3>
    <input id="vaName" placeholder="VA Name">
    <input id="agency" placeholder="Agency">

    <select id="trainerSelect">
        <option>Au</option>
        <option>Chanie</option>
        <option>Leo</option>
    </select>

    <button onclick="assignVA()">Assign VA</button>
</div>

<div class="card">
    <h3 id="classTitle"></h3>
    <div class="grid" id="seatGrid"></div>
</div>

</div>
</div>

<!-- ACTION POPUP -->
<div id="actionModal" class="modal">
    <div class="modal-box">
        <h3 id="actionTitle"></h3>

        <button onclick="openEdit()">Edit</button>
        <button onclick="openMove()">Move</button>
        <button class="danger" onclick="deleteVA()">Delete</button>
        <button class="closeBtn" onclick="closeAction()">Close</button>
    </div>
</div>

<!-- EDIT/MOVE MODAL -->
<div id="editModal" class="modal">
    <div class="modal-box">
        <h3 id="editTitle"></h3>

        <input id="modalName" placeholder="Name">
        <input id="modalAgency" placeholder="Agency (if edit)">

        <select id="modalTrainer" style="display:none;">
            <option>Au</option>
            <option>Chanie</option>
            <option>Leo</option>
        </select>

        <button onclick="confirmModal()">Save</button>
        <button class="closeBtn" onclick="closeEdit()">Cancel</button>
    </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>

let trainers = JSON.parse(localStorage.getItem("va_data")) || {
    Au: [],
    Chanie: [],
    Leo: []
};

let currentTrainer = "Au";
let selectedIndex = null;
let mode = "";

/* SAVE */
function save() {
    localStorage.setItem("va_data", JSON.stringify(trainers));
}

/* TOAST */
function toast(msg) {
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
}

/* SWITCH */
function switchTrainer(t) {
    currentTrainer = t;
    render();
}

/* ASSIGN */
function assignVA() {
    let name = document.getElementById("vaName").value;
    let agency = document.getElementById("agency").value;
    let trainer = document.getElementById("trainerSelect").value;

    if (!name || !agency) return;

    trainers[trainer].push({ name, agency });
    save();
    render();
    toast("VA added");
}

/* SEARCH */
function handleSearch(e) {
    if (e.key === "Enter") searchVA(e.target.value);
}

function searchVA(q) {
    q = q.toLowerCase();

    for (let t in trainers) {
        for (let i = 0; i < trainers[t].length; i++) {
            if (trainers[t][i].name.toLowerCase().includes(q)) {
                currentTrainer = t;
                render();
                return;
            }
        }
    }
}

/* RENDER */
function render() {
    let grid = document.getElementById("seatGrid");
    grid.innerHTML = "";

    let list = trainers[currentTrainer];
    document.getElementById("classTitle").innerText = currentTrainer;

    let filled = 0;

    for (let i = 0; i < 10; i++) {
        let seat = document.createElement("div");
        seat.className = "seat";

        let va = list[i];

        if (va) {
            seat.innerHTML = `<b>${va.name}</b><br>${va.agency}`;
            seat.onclick = () => openAction(i);
            filled++;
        } else {
            seat.innerHTML = "Empty";
        }

        grid.appendChild(seat);
    }

    document.getElementById("occupancy").innerText = filled + "/10 seats";
}

/* ACTION */
function openAction(i) {
    selectedIndex = i;
    document.getElementById("actionModal").classList.add("active");
}

/* CLOSE ACTION */
function closeAction() {
    document.getElementById("actionModal").classList.remove("active");
}

/* DELETE */
function deleteVA() {
    trainers[currentTrainer].splice(selectedIndex, 1);
    save();
    render();
    closeAction();
    toast("Deleted");
}

/* OPEN EDIT */
function openEdit() {
    mode = "edit";
    let va = trainers[currentTrainer][selectedIndex];

    document.getElementById("editTitle").innerText = "Edit VA";
    document.getElementById("modalName").value = va.name;
    document.getElementById("modalAgency").style.display = "block";
    document.getElementById("modalAgency").value = va.agency;

    document.getElementById("modalTrainer").style.display = "none";

    document.getElementById("editModal").classList.add("active");
    closeAction();
}

/* OPEN MOVE */
function openMove() {
    mode = "move";

    document.getElementById("editTitle").innerText = "Move VA";
    document.getElementById("modalName").style.display = "none";
    document.getElementById("modalAgency").style.display = "none";
    document.getElementById("modalTrainer").style.display = "block";

    document.getElementById("editModal").classList.add("active");
    closeAction();
}

/* CONFIRM MODAL */
function confirmModal() {

    if (mode === "edit") {
        let name = document.getElementById("modalName").value;
        let agency = document.getElementById("modalAgency").value;

        trainers[currentTrainer][selectedIndex] = { name, agency };

    } else if (mode === "move") {
        let t = document.getElementById("modalTrainer").value;

        let va = trainers[currentTrainer][selectedIndex];
        trainers[t].push(va);
        trainers[currentTrainer].splice(selectedIndex, 1);
    }

    save();
    render();
    closeEdit();
    toast("Updated");
}

/* CLOSE EDIT */
function closeEdit() {
    document.getElementById("editModal").classList.remove("active");
}

/* INIT */
render();

</script>

</body>
</html>
