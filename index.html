<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VA Classroom Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
}

.topbar {
    background: linear-gradient(90deg, #0f172a, #1e293b);
    color: white;
    padding: 16px;
    font-weight: 600;
}

.container {
    display: flex;
    height: calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar {
    width: 25%;
    background: #0f172a;
    color: #e2e8f0;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.sidebar button {
    width: 100%;
    margin: 6px 0;
    padding: 10px;
    background: transparent;
    border: 1px solid #334155;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

.sidebar button:hover {
    background: #ef4444;
}

/* TRAINER IMAGE */
.trainer-photo {
    margin-top: 20px;
    text-align: center;
}

.trainer-photo img {
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius: 16px;
    border: 2px solid #ef4444;
    transition: 0.3s ease;
    cursor: pointer;
}

.trainer-photo img:hover {
    transform: scale(1.05) rotate(-1deg);
    box-shadow: 0 15px 35px rgba(239,68,68,0.4);
}

.trainer-photo p {
    margin-top: 8px;
    font-weight: 600;
}

/* PROFILE PANEL */
#trainerPanel {
    margin-top: 15px;
    padding: 12px;
    background: #111827;
    border-radius: 12px;
    display: none;
}

.badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    margin-top: 5px;
}

.badge.red { background:#ef4444; color:white; }
.badge.blue { background:#3b82f6; color:white; }
.badge.gold { background:#f59e0b; color:white; }

/* MAIN */
.main {
    width: 75%;
    padding: 24px;
}

.card {
    background: white;
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 20px;
}

/* INPUT */
input, select {
    padding: 10px;
    margin: 8px 0;
    width: 280px;
    border-radius: 10px;
    border: 1px solid #cbd5f5;
}

/* BUTTON */
button {
    background: #ef4444;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 10px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
}

/* SEAT */
.seat {
    background: white;
    border-radius: 12px;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    min-height: 75px;
    border: 1px solid #e5e7eb;
}

.seat:hover {
    transform: translateY(-3px);
}

/* TOAST */
.toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #111827;
    color: white;
    padding: 12px;
    border-left: 5px solid #ef4444;
    border-radius: 10px;
    opacity: 0;
    transition: 0.3s;
    z-index: 9999;
}

.toast.show {
    opacity: 1;
}

/* MODAL */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(15,23,42,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10000;
}

.modal.active {
    display: flex;
}

.modal-box {
    background: white;
    width: 340px;
    padding: 20px;
    border-radius: 14px;
    text-align: center;
}

/* ACTION BUTTONS */
.modal-box button {
    width: 100%;
    margin: 6px 0;
    padding: 10px;
}

.edit { background: #3b82f6 !important; }
.move { background: #f59e0b !important; }
.delete { background: #ef4444 !important; }
.closeBtn { background: #64748b !important; }

</style>
</head>

<body>

<div class="topbar">VA Classroom Dashboard</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>Trainer View</h3>

    <button onclick="switchTrainer('Au')">Au</button>
    <button onclick="switchTrainer('Chanie')">Chanie</button>
    <button onclick="switchTrainer('Leo')">Leo</button>

    <hr>

    <div id="occupancy">0/10 seats</div>

    <h4>Search VA</h4>
    <input id="searchBox" onkeydown="handleSearch(event)">

    <!-- TRAINER IMAGE -->
    <div class="trainer-photo">
        <img id="trainerImg" src="au.png">
        <p id="trainerName">Au</p>
    </div>

    <!-- PROFILE PANEL -->
    <div id="trainerPanel">
        <h4>Trainer Profile</h4>
        <div id="trainerBadge"></div>
        <div id="trainerCount"></div>

        <div style="background:#1f2937;height:10px;border-radius:10px;margin-top:6px;">
            <div id="bar" style="height:10px;width:0;background:#ef4444;border-radius:10px;"></div>
        </div>
    </div>
</div>

<!-- MAIN -->
<div class="main">

<div class="card">
    <h3>Assign VA</h3>
    <input id="vaName" placeholder="VA Name">
    <input id="agency" placeholder="Agency">

    <select id="trainerSelect">
        <option>Au</option>
        <option>Chanie</option>
        <option>Leo</option>
    </select>

    <button onclick="assignVA()">Assign VA</button>
</div>

<div class="card">
    <h3 id="classTitle"></h3>
    <div class="grid" id="seatGrid"></div>
</div>

</div>
</div>

<!-- ACTION MODAL -->
<div id="actionModal" class="modal">
    <div class="modal-box">
        <h3 id="actionTitle"></h3>

        <button onclick="openEditName()" class="edit">Edit Name</button>
        <button onclick="openEditAgency()" class="edit">Edit Agency</button>
        <button onclick="openMove()" class="move">Move</button>
        <button onclick="deleteVA()" class="delete">Delete</button>
        <button onclick="closeAction()" class="closeBtn">Close</button>
    </div>
</div>

<!-- EDIT MODAL -->
<div id="editModal" class="modal">
    <div class="modal-box">
        <h3>Edit</h3>

        <input id="modalName">
        <input id="modalAgency">

        <select id="modalTrainer" style="display:none;">
            <option>Au</option>
            <option>Chanie</option>
            <option>Leo</option>
        </select>

        <button onclick="confirmModal()">Save</button>
        <button class="closeBtn" onclick="closeEdit()">Cancel</button>
    </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>

let trainers = JSON.parse(localStorage.getItem("va_data")) || {
    Au: [],
    Chanie: [],
    Leo: []
};

let currentTrainer = "Au";
let selectedIndex = null;
let mode = "";

const trainerImages = {
    Au: "au.png",
    Chanie: "chanie.png",
    Leo: "leo.png"
};

/* SAVE */
function save() {
    localStorage.setItem("va_data", JSON.stringify(trainers));
}

/* TOAST */
function toast(msg) {
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
}

/* TRAINER PANEL */
function updateTrainerUI() {
    document.getElementById("trainerImg").src = trainerImages[currentTrainer];
    document.getElementById("trainerName").innerText = currentTrainer;

    document.getElementById("trainerImg").onclick = showTrainerPanel;
}

/* PROFILE PANEL */
function showTrainerPanel() {
    let count = trainers[currentTrainer].length;
    let percent = (count / 10) * 100;

    document.getElementById("trainerPanel").style.display = "block";

    document.getElementById("trainerCount").innerText =
        `VA Count: ${count}/10`;

    document.getElementById("bar").style.width = percent + "%";

    let badge = "";

    if (count === 0) badge = `<span class="badge blue">Empty</span>`;
    else if (count < 5) badge = `<span class="badge gold">Light Load</span>`;
    else if (count < 10) badge = `<span class="badge red">Busy</span>`;
    else badge = `<span class="badge red">Full</span>`;

    document.getElementById("trainerBadge").innerHTML = badge;
}

/* SWITCH */
function switchTrainer(t) {
    currentTrainer = t;
    updateTrainerUI();
    render();
}

/* ASSIGN */
function assignVA() {
    let name = document.getElementById("vaName").value;
    let agency = document.getElementById("agency").value;
    let trainer = document.getElementById("trainerSelect").value;

    trainers[trainer].push({ name, agency });
    save();
    render();
    toast("VA added");
}

/* SEARCH */
function handleSearch(e) {
    if (e.key === "Enter") searchVA(e.target.value);
}

function searchVA(q) {
    q = q.toLowerCase();

    for (let t in trainers) {
        for (let i = 0; i < trainers[t].length; i++) {
            if (trainers[t][i].name.toLowerCase().includes(q)) {
                currentTrainer = t;
                updateTrainerUI();
                render();
                return;
            }
        }
    }
}

/* RENDER */
function render() {
    let grid = document.getElementById("seatGrid");
    grid.innerHTML = "";

    let list = trainers[currentTrainer];
    document.getElementById("classTitle").innerText = currentTrainer;

    let filled = 0;

    for (let i = 0; i < 10; i++) {
        let seat = document.createElement("div");
        seat.className = "seat";

        let va = list[i];

        if (va) {
            seat.innerHTML = `<b>${va.name}</b><br>${va.agency}`;
            seat.onclick = () => openAction(i);
            filled++;
        } else {
            seat.innerHTML = "Empty";
        }

        grid.appendChild(seat);
    }

    document.getElementById("occupancy").innerText = filled + "/10 seats";
}

/* ACTION */
function openAction(i) {
    selectedIndex = i;
    document.getElementById("actionModal").classList.add("active");
    document.getElementById("actionTitle").innerText =
        trainers[currentTrainer][i].name;
}

function closeAction() {
    document.getElementById("actionModal").classList.remove("active");
}

/* DELETE */
function deleteVA() {
    trainers[currentTrainer].splice(selectedIndex, 1);
    save();
    render();
    closeAction();
    toast("Deleted");
}

/* EDIT NAME */
function openEditName() {
    mode = "editName";
    let va = trainers[currentTrainer][selectedIndex];

    document.getElementById("modalName").value = va.name;
    document.getElementById("modalAgency").style.display = "none";

    document.getElementById("editModal").classList.add("active");
    closeAction();
}

/* EDIT AGENCY */
function openEditAgency() {
    mode = "editAgency";
    let va = trainers[currentTrainer][selectedIndex];

    document.getElementById("modalAgency").style.display = "block";
    document.getElementById("modalName").style.display = "none";

    document.getElementById("modalAgency").value = va.agency;

    document.getElementById("editModal").classList.add("active");
    closeAction();
}

/* MOVE */
function openMove() {
    mode = "move";

    document.getElementById("modalTrainer").style.display = "block";
    document.getElementById("editModal").classList.add("active");
    closeAction();
}

/* CONFIRM */
function confirmModal() {

    if (mode === "editName") {
        trainers[currentTrainer][selectedIndex].name =
            document.getElementById("modalName").value;
    }

    if (mode === "editAgency") {
        trainers[currentTrainer][selectedIndex].agency =
            document.getElementById("modalAgency").value;
    }

    if (mode === "move") {
        let t = document.getElementById("modalTrainer").value;

        let va = trainers[currentTrainer][selectedIndex];
        trainers[t].push(va);
        trainers[currentTrainer].splice(selectedIndex, 1);
    }

    save();
    render();
    closeEdit();
    toast("Updated");
}

/* CLOSE */
function closeEdit() {
    document.getElementById("editModal").classList.remove("active");
}

/* INIT */
updateTrainerUI();
render();

</script>

</body>
</html>
